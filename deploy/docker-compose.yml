services:
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: guashuai-frontend
    ports:
      - "5173:5173"
    volumes:
      - ../frontend/src:/app/src
    depends_on:
      - backend
    networks:
      - guashuai-network

  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: guashuai-backend
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    volumes:
      - ../backend:/app
      - ../agents:/app/agents
      - ../skills:/app/skills
      - ../data:/app/data
      - ../chroma_db:/app/chroma_db
    depends_on:
      redis:
        condition: service_started
      chroma:
        condition: service_started
    networks:
      - guashuai-network

  redis:
    image: redis:7-alpine
    container_name: guashuai-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - guashuai-network

  chroma:
    image: chromadb/chroma:latest
    container_name: guashuai-chroma
    ports:
      - "8001:8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      - IS_PERSISTENT=TRUE
    networks:
      - guashuai-network

volumes:
  redis_data:
  chroma_data:

networks:
  guashuai-network:
    driver: bridge
